<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Listening Practice - 英文聽力訓練助手</title>
    <!-- 引入 Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0b071e 0%, #120c2b 50%, #05030f 100%);
            --panel-bg: rgba(255, 255, 255, 0.04);
            --panel-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #7b2cbf;
            --accent-secondary: #3a0ca3;
            --accent-glow: rgba(123, 44, 191, 0.4);
            --text-main: #f3f0fc;
            --text-muted: #a5a1b8;
            --success-color: #00f5d4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 背景微光裝飾 */
        .glow-orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(123, 44, 191, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: -1;
            filter: blur(40px);
        }

        .glow-orb-1 {
            top: 10%;
            left: 15%;
        }

        .glow-orb-2 {
            bottom: 10%;
            right: 15%;
        }

        /* 主容器 */
        .container {
            width: 100%;
            max-width: 750px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
            background: linear-gradient(90deg, #ffffff, #c7a8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 35px;
        }

        /* 表單元素 */
        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 16px;
            color: var(--text-main);
            font-size: 16px;
            line-height: 1.6;
            resize: none;
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
        }

        textarea:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px var(--accent-glow);
            background: rgba(0, 0, 0, 0.35);
        }

        /* 朗讀看板 */
        .reader-panel-container {
            margin-bottom: 24px;
            display: none; /* 預設隱藏，生成後顯示 */
        }

        .reader-panel {
            width: 100%;
            min-height: 80px;
            max-height: 250px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            font-size: 18px;
            line-height: 1.8;
            letter-spacing: 0.5px;
            color: #e2daf8;
            overflow-y: auto;
            word-wrap: break-word;
            white-space: pre-wrap; /* 保留換行 */
        }

        /* 單字 span 樣式 */
        .word-span {
            padding: 1px 4px;
            border-radius: 4px;
            transition: all 0.15s ease;
            cursor: pointer;
            display: inline-block;
            margin: 0 2px;
        }

        .word-span:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        /* 正在朗讀的單字高亮樣式 */
        .word-span.highlight {
            background: linear-gradient(120deg, #ff007f 0%, #7b2cbf 100%);
            color: #ffffff;
            box-shadow: 0 0 12px rgba(255, 0, 127, 0.7);
            transform: scale(1.05);
            font-weight: 600;
        }

        /* 雙欄控制區 */
        .control-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (max-width: 600px) {
            .control-row {
                grid-template-columns: 1fr;
            }
        }

        select {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        select:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        /* 語速 Slider 樣式 */
        .slider-container {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .slider-value {
            font-weight: 600;
            color: var(--success-color);
            font-size: 14px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent-primary);
            cursor: pointer;
            box-shadow: 0 0 8px var(--accent-glow);
            transition: all 0.2s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: #9d4edd;
        }

        /* 按鈕區 */
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            color: #ffffff;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(123, 44, 191, 0.6);
            filter: brightness(1.1);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--panel-border);
            color: var(--text-main);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* 隱藏的 HTML5 audio */
        audio {
            display: none;
        }

        /* 歷史紀錄區 */
        .history-section {
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 30px;
        }

        .history-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .history-list {
            max-height: 220px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 5px;
        }

        /* 自訂滾動條 */
        .history-list::-webkit-scrollbar {
            width: 6px;
        }

        .history-list::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 3px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .history-list::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .history-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .history-info {
            flex: 1;
            margin-right: 15px;
            min-width: 0; /* 讓 text-overflow 生效 */
        }

        .history-text {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .history-meta {
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            gap: 12px;
        }

        .history-meta span {
            display: inline-block;
        }

        .history-play-btn {
            background: rgba(123, 44, 191, 0.2);
            border: 1px solid rgba(123, 44, 191, 0.3);
            color: #d8b4fe;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        .history-play-btn:hover {
            background: var(--accent-primary);
            color: #ffffff;
            transform: scale(1.1);
        }

        .history-empty {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            padding: 20px 0;
            border: 1px dashed rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <div class="container">
        <h1>English Listening Companion</h1>
        <p class="subtitle">專為英文聽力訓練設計的發音助手</p>

        <!-- 隱藏的 audio 元素 -->
        <audio id="audio-player"></audio>

        <!-- 輸入英文 -->
        <div class="form-group">
            <label for="text-input">英文文字內容</label>
            <textarea id="text-input" placeholder="在這裡輸入想要練習聽力的英文單字、句子或段落..."></textarea>
        </div>

        <!-- 播放控制按鈕 -->
        <div class="button-group" style="margin-top: 0; margin-bottom: 24px;">
            <button id="generate-btn" class="btn btn-primary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                生成並播放
            </button>
            <button id="replay-btn" class="btn btn-secondary" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path></svg>
                重複播放
            </button>
        </div>

        <!-- 朗讀看板 -->
        <div id="reader-panel-container" class="reader-panel-container">
            <label>朗讀看板 (點擊單字可重聽該單字之後的內容)</label>
            <div id="reader-panel" class="reader-panel"></div>
        </div>

        <!-- 語音角色與語速設定 -->
        <div class="control-row">
            <div class="form-group">
                <label for="voice-select">語音角色 (發音人)</label>
                <select id="voice-select">
                    {% for name, val in voices.items() %}
                    <option value="{{ val }}" {% if val == "en-US-AvaNeural" %}selected{% endif %}>{{ name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group slider-container">
                <div class="slider-header">
                    <label style="margin-bottom: 0;">語速調整</label>
                    <span id="speed-display" class="slider-value">-30%</span>
                </div>
                <input type="range" id="speed-slider" min="-50" max="50" value="-30">
            </div>
        </div>

        <!-- 高亮同步微調 -->
        <div class="control-row" style="margin-bottom: 30px;">
            <div class="form-group slider-container" style="grid-column: span 2;">
                <div class="slider-header">
                    <label style="margin-bottom: 0;">高亮同步微調 (修正藍牙耳機/喇叭播放延遲)</label>
                    <span id="delay-display" class="slider-value">0.18 秒</span>
                </div>
                <input type="range" id="delay-slider" min="0" max="50" value="18">
            </div>
        </div>

        <!-- 聽力歷史紀錄 -->
        <div class="history-section">
            <div class="history-title">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                聽力練習紀錄 (快取重複播放)
            </div>
            <div id="history-container" class="history-list">
                <div class="history-empty">目前尚未有播放紀錄，輸入文字並點擊生成開始練習！</div>
            </div>
        </div>
    </div>

    <script>
        const audioPlayer = document.getElementById('audio-player');
        const textInput = document.getElementById('text-input');
        const voiceSelect = document.getElementById('voice-select');
        const speedSlider = document.getElementById('speed-slider');
        const speedDisplay = document.getElementById('speed-display');
        const delaySlider = document.getElementById('delay-slider');
        const delayDisplay = document.getElementById('delay-display');
        const generateBtn = document.getElementById('generate-btn');
        const replayBtn = document.getElementById('replay-btn');
        const historyContainer = document.getElementById('history-container');
        const readerPanelContainer = document.getElementById('reader-panel-container');
        const readerPanel = document.getElementById('reader-panel');

        let currentAudioUrl = null;
        let currentWordsData = [];
        let historyItems = [];
        let highlightAnimationFrame = null;

        // 更新語速顯示文字
        speedSlider.addEventListener('input', () => {
            const val = parseInt(speedSlider.value);
            const prefix = val >= 0 ? '+' : '';
            speedDisplay.textContent = `${prefix}${val}%`;
        });

        // 更新延遲補償顯示文字
        delaySlider.addEventListener('input', () => {
            const val = parseFloat(delaySlider.value) / 100.0;
            delayDisplay.textContent = `${val.toFixed(2)} 秒`;
        });

        // 僅在單字超出可見範圍時才滾動，避免畫面抖動與效能問題
        function scrollIfNeeded(element, container) {
            const rect = element.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            
            // 如果單字不在容器的可見上下邊界內，才進行滾動
            if (rect.bottom > containerRect.bottom || rect.top < containerRect.top) {
                element.scrollIntoView({ behavior: 'auto', block: 'nearest' });
            }
        }

        // 朗讀看板高亮與對焦動畫
        function startHighlighter() {
            if (highlightAnimationFrame) {
                cancelAnimationFrame(highlightAnimationFrame);
            }

            function update() {
                if (!audioPlayer.paused && !audioPlayer.ended) {
                    // 扣除使用者設定的延遲時間，以補償硬體播放延遲
                    const delayVal = parseInt(delaySlider.value) / 100.0;
                    const time = audioPlayer.currentTime - delayVal;
                    const spans = readerPanel.querySelectorAll('.word-span');
                    
                    spans.forEach(span => {
                        const start = parseFloat(span.getAttribute('data-start'));
                        const end = parseFloat(span.getAttribute('data-end'));
                        
                        if (time >= start && time <= end) {
                            if (!span.classList.contains('highlight')) {
                                span.classList.add('highlight');
                                scrollIfNeeded(span, readerPanel);
                            }
                        } else {
                            span.classList.remove('highlight');
                        }
                    });
                    
                    highlightAnimationFrame = requestAnimationFrame(update);
                }
            }

            highlightAnimationFrame = requestAnimationFrame(update);
        }

        audioPlayer.addEventListener('play', startHighlighter);
        
        audioPlayer.addEventListener('pause', () => {
            if (highlightAnimationFrame) cancelAnimationFrame(highlightAnimationFrame);
        });

        audioPlayer.addEventListener('ended', () => {
            if (highlightAnimationFrame) cancelAnimationFrame(highlightAnimationFrame);
            // 播放結束時移除所有高亮
            readerPanel.querySelectorAll('.word-span').forEach(span => span.classList.remove('highlight'));
        });

        // 解析文字並渲染為可點擊 spans
        function setupReaderPanel(text, words) {
            readerPanelContainer.style.display = 'block';
            
            // 匹配單字：英文字母、數字、連字號與縮寫
            const wordRegex = /([a-zA-Z0-9'-]+)/g;
            let match;
            let wordIndex = 0;
            let lastIndex = 0;
            let html = "";

            while ((match = wordRegex.exec(text)) !== null) {
                // 拼接單字前的非單字（如空格、標點符號）
                html += text.substring(lastIndex, match.index);
                
                const matchedWord = match[0];
                
                if (wordIndex < words.length) {
                    const wordInfo = words[wordIndex];
                    html += `<span class="word-span" id="word-${wordIndex}" data-start="${wordInfo.start}" data-end="${wordInfo.end}">${matchedWord}</span>`;
                    wordIndex++;
                } else {
                    html += `<span>${matchedWord}</span>`;
                }
                
                lastIndex = wordRegex.lastIndex;
            }
            
            html += text.substring(lastIndex);
            readerPanel.innerHTML = html;

            // 綁定點擊單字跳轉重聽事件
            readerPanel.querySelectorAll('.word-span').forEach(span => {
                span.addEventListener('click', () => {
                    const start = parseFloat(span.getAttribute('data-start'));
                    audioPlayer.currentTime = start;
                    audioPlayer.play();
                });
            });
        }

        // 生成發音按鈕邏輯
        generateBtn.addEventListener('click', async () => {
            const text = textInput.value.trim();
            if (!text) {
                alert('請輸入英文文字！');
                return;
            }

            const voice = voiceSelect.value;
            const rateVal = parseInt(speedSlider.value);
            const rateStr = `${rateVal >= 0 ? '+' : ''}${rateVal}%`;

            generateBtn.disabled = true;
            generateBtn.innerHTML = '⏳ 生成中...';

            try {
                // 向 API 發送請求，回傳 JSON (音訊 base64 與單字時間軸)
                const response = await fetch(`/api/tts?text=${encodeURIComponent(text)}&voice=${voice}&rate=${encodeURIComponent(rateStr)}`);
                
                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || '語音生成失敗');
                }

                const data = await response.json();
                
                currentAudioUrl = data.audio;
                currentWordsData = data.words;

                // 渲染朗讀看板
                setupReaderPanel(text, currentWordsData);

                // 設定並播放音訊
                audioPlayer.src = currentAudioUrl;
                audioPlayer.play();

                // 啟用重複播放按鈕
                replayBtn.disabled = false;

                // 新增至歷史紀錄
                addToHistory(text, voiceSelect.options[voiceSelect.selectedIndex].text, rateStr, currentAudioUrl, currentWordsData);

            } catch (error) {
                console.error(error);
                alert(`發生錯誤: ${error.message}`);
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    生成並播放
                `;
            }
        });

        // 重複播放按鈕邏輯
        replayBtn.addEventListener('click', () => {
            if (currentAudioUrl) {
                // 點擊重複播放時重置時間並播放，並重繪高亮看板
                audioPlayer.currentTime = 0;
                audioPlayer.play();
            }
        });

        // 新增至歷史紀錄
        function addToHistory(text, voiceName, rate, audioUrl, words) {
            // 避免重複加入相同的文字記錄
            const existIndex = historyItems.findIndex(item => item.text === text && item.rate === rate && item.voiceName === voiceName);
            if (existIndex > -1) {
                historyItems.splice(existIndex, 1);
            }

            // 最多存 20 筆
            if (historyItems.length >= 20) {
                historyItems.pop();
            }

            // 將新項目加到最前面
            historyItems.unshift({ text, voiceName, rate, audioUrl, words });
            renderHistory();
        }

        // 渲染歷史紀錄列表
        function renderHistory() {
            if (historyItems.length === 0) {
                historyContainer.innerHTML = '<div class="history-empty">目前尚未有播放紀錄，輸入文字並點擊生成開始練習！</div>';
                return;
            }

            historyContainer.innerHTML = '';
            historyItems.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                
                div.innerHTML = `
                    <div class="history-info">
                        <div class="history-text" title="${item.text.replace(/"/g, '&quot;')}">${item.text}</div>
                        <div class="history-meta">
                            <span>聲音: ${item.voiceName}</span>
                            <span>語速: ${item.rate}</span>
                        </div>
                    </div>
                    <button class="history-play-btn" title="重聽此項目">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    </button>
                `;

                // 綁定歷史項目播放事件
                div.querySelector('.history-play-btn').addEventListener('click', () => {
                    currentAudioUrl = item.audioUrl;
                    currentWordsData = item.words;

                    // 重建發音看板
                    setupReaderPanel(item.text, currentWordsData);

                    // 更新當前播放源並播放
                    audioPlayer.src = currentAudioUrl;
                    audioPlayer.play();
                    
                    replayBtn.disabled = false;
                    
                    // 將文字帶回輸入框方便檢視
                    textInput.value = item.text;
                });

                historyContainer.appendChild(div);
            });
        }
    </script>
</body>
</html>
